<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus Report Generator</title>
  <style>
    /* ── Reset & base ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:        #1a3a5c;
      --brand-light:  #e8f0f8;
      --accent:       #c8a951;
      --text:         #1a1a1a;
      --muted:        #6b7280;
      --border:       #d1d5db;
      --bg:           #f8f9fb;
      --card:         #ffffff;
      --danger:       #b91c1c;
      --success:      #15803d;
      --radius:       8px;
      --shadow:       0 1px 4px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Top nav ───────────────────────────────────────────── */
    nav {
      background: var(--brand);
      color: #fff;
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    nav .logo {
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: .04em;
    }
    nav .logo span { color: var(--accent); }
    nav .sub { font-size: .8rem; opacity: .65; margin-left: 4px; }

    /* ── Layout ────────────────────────────────────────────── */
    .layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      min-height: calc(100vh - 56px);
    }

    /* ── Sidebar / form panel ───────────────────────────────── */
    .sidebar {
      background: var(--card);
      border-right: 1px solid var(--border);
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      position: sticky;
      top: 0;
      height: calc(100vh - 56px);
      overflow-y: auto;
    }

    .sidebar h2 {
      font-size: .9rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
    }

    label {
      display: block;
      font-size: .8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: .35rem;
    }

    input[type="text"], textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .6rem .75rem;
      font-size: .95rem;
      color: var(--text);
      background: var(--card);
      transition: border-color .15s, box-shadow .15s;
      font-family: inherit;
    }
    input[type="text"]:focus, textarea:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(26,58,92,.12);
    }

    textarea {
      resize: vertical;
      min-height: 280px;
      font-size: .85rem;
      line-height: 1.5;
      font-family: "SF Mono", "Fira Code", Consolas, monospace;
    }

    .hint {
      font-size: .78rem;
      color: var(--muted);
      margin-top: .25rem;
    }

    .file-row {
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .file-btn {
      cursor: pointer;
      font-size: .8rem;
      padding: .35rem .75rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--muted);
      transition: background .15s;
    }
    .file-btn:hover { background: var(--brand-light); color: var(--brand); }
    #file-input { display: none; }
    #file-name { font-size: .78rem; color: var(--muted); }

    .submit-btn {
      width: 100%;
      padding: .75rem;
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: .02em;
      transition: background .15s, transform .1s;
      margin-top: .5rem;
    }
    .submit-btn:hover { background: #142e4c; }
    .submit-btn:active { transform: scale(.98); }
    .submit-btn:disabled { opacity: .55; cursor: not-allowed; }

    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: var(--danger);
      border-radius: var(--radius);
      padding: .65rem .85rem;
      font-size: .85rem;
      display: none;
    }

    /* ── Main report area ───────────────────────────────────── */
    .report-area {
      padding: 2.5rem 3rem;
      max-width: 900px;
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 400px;
      text-align: center;
      color: var(--muted);
      gap: 1rem;
    }
    .empty-state svg { opacity: .25; }
    .empty-state p { font-size: .95rem; max-width: 300px; line-height: 1.6; }

    /* Loading state */
    .loading {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      gap: 1rem;
      color: var(--muted);
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Download bar */
    .download-bar {
      display: none;
      align-items: center;
      gap: .75rem;
      background: var(--brand-light);
      border: 1px solid #bcd4ee;
      border-radius: var(--radius);
      padding: .75rem 1.1rem;
      margin-bottom: 1.75rem;
      flex-wrap: wrap;
    }
    .download-bar .dl-label {
      font-size: .82rem;
      font-weight: 600;
      color: var(--brand);
      text-transform: uppercase;
      letter-spacing: .05em;
      flex: 1;
    }
    .dl-btn {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      padding: .4rem .9rem;
      border-radius: var(--radius);
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background .15s;
    }
    .dl-btn.md { background: var(--brand); color: #fff; }
    .dl-btn.md:hover { background: #142e4c; }
    .dl-btn.pdf { background: var(--accent); color: #fff; }
    .dl-btn.pdf:hover { background: #a8882e; }
    .dl-btn.new { background: transparent; border: 1px solid var(--brand); color: var(--brand); }
    .dl-btn.new:hover { background: var(--brand-light); }

    /* ── Rendered report typography ─────────────────────────── */
    #report-output { display: none; }
    #report-output h1 {
      font-size: 1.65rem;
      font-weight: 700;
      color: var(--brand);
      border-bottom: 3px solid var(--accent);
      padding-bottom: .5rem;
      margin-bottom: 1.25rem;
      letter-spacing: -.01em;
    }
    #report-output h2 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--brand);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin: 2rem 0 .75rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: .4rem;
    }
    #report-output h3 {
      font-size: 1.02rem;
      font-weight: 700;
      color: var(--text);
      margin: 1.4rem 0 .5rem;
    }
    #report-output h4 {
      font-size: .95rem;
      font-weight: 700;
      color: var(--brand);
      margin: 1.1rem 0 .4rem;
    }
    #report-output p {
      line-height: 1.75;
      margin-bottom: .85rem;
      font-size: .97rem;
    }
    #report-output ul, #report-output ol {
      margin: .5rem 0 .85rem 1.5rem;
    }
    #report-output li {
      line-height: 1.7;
      margin-bottom: .3rem;
      font-size: .96rem;
    }
    #report-output strong { color: var(--brand); }
    #report-output em { color: var(--muted); font-style: italic; }
    #report-output hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.75rem 0;
    }
    #report-output a { color: var(--brand); }
    #report-output blockquote {
      border-left: 3px solid var(--accent);
      padding: .5rem 1rem;
      color: var(--muted);
      margin: 1rem 0;
      background: var(--brand-light);
      border-radius: 0 var(--radius) var(--radius) 0;
    }
    #report-output table {
      border-collapse: collapse;
      width: 100%;
      margin: 1rem 0;
      font-size: .9rem;
    }
    #report-output th {
      background: var(--brand);
      color: #fff;
      padding: .6rem .85rem;
      text-align: left;
      font-size: .8rem;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    #report-output td {
      padding: .55rem .85rem;
      border-bottom: 1px solid var(--border);
    }
    #report-output tr:nth-child(even) td { background: var(--bg); }
    /* Inline citation numbers like [1, 2] */
    #report-output p, #report-output li {
      font-feature-settings: "tnum";
    }

    /* ── Responsive ─────────────────────────────────────────── */
    @media (max-width: 820px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar {
        position: static;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      .report-area { padding: 1.5rem 1.25rem; }
    }
  </style>
</head>
<body>

<nav>
  <div class="logo">NEXUS <span>×</span> UNC</div>
  <div class="sub">Partnership Report Generator</div>
</nav>

<div class="layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <h2>New Report</h2>

    <div>
      <label for="company-input">Company Name</label>
      <input type="text" id="company-input" placeholder="e.g. Sanofi" autocomplete="off" />
    </div>

    <div>
      <label for="content-input">Raw Report Content</label>
      <textarea id="content-input" placeholder="Paste your markdown report content here…"></textarea>
      <p class="hint">Supports full Markdown — headings, bullets, tables, bold, citations.</p>
    </div>

    <div>
      <label>Or load from file</label>
      <div class="file-row">
        <label class="file-btn" for="file-input">Choose .md file</label>
        <input type="file" id="file-input" accept=".md,.txt" />
        <span id="file-name">No file selected</span>
      </div>
    </div>

    <div id="error-msg" class="error-msg"></div>

    <button class="submit-btn" id="submit-btn" onclick="generateReport()">
      Generate Report
    </button>
  </aside>

  <!-- ── Report panel ── -->
  <main class="report-area" id="report-panel">

    <div class="empty-state" id="empty-state">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
      <p>Paste your report content and click <strong>Generate Report</strong> to render and export a formatted partnership brief.</p>
    </div>

    <div class="loading" id="loading-state">
      <div class="spinner"></div>
      <p>Rendering report…</p>
    </div>

    <div class="download-bar" id="download-bar">
      <span class="dl-label">Report ready</span>
      <a id="dl-md" href="#" class="dl-btn md">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Markdown
      </a>
      <a id="dl-pdf" href="#" class="dl-btn pdf">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        PDF
      </a>
      <button class="dl-btn new" onclick="resetForm()">New Report</button>
    </div>

    <div id="report-output"></div>

  </main>
</div>

<script>
  // ── File loader ────────────────────────────────────────────
  document.getElementById("file-input").addEventListener("change", function () {
    const file = this.files[0];
    if (!file) return;
    document.getElementById("file-name").textContent = file.name;

    // Auto-fill company name from filename if empty
    const companyInput = document.getElementById("company-input");
    if (!companyInput.value.trim()) {
      companyInput.value = file.name.replace(/\.[^.]+$/, "").replace(/[_\-]/g, " ");
    }

    const reader = new FileReader();
    reader.onload = (e) => {
      document.getElementById("content-input").value = e.target.result;
    };
    reader.readAsText(file);
  });

  // ── Generate ───────────────────────────────────────────────
  async function generateReport() {
    const company = document.getElementById("company-input").value.trim();
    const content = document.getElementById("content-input").value.trim();
    const errorEl = document.getElementById("error-msg");

    errorEl.style.display = "none";

    if (!company) { showError("Please enter a company name."); return; }
    if (!content)  { showError("Please paste or load report content."); return; }

    setLoading(true);

    try {
      const res = await fetch("/api/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ company, content }),
      });
      const data = await res.json();

      if (!res.ok || data.error) {
        showError(data.error || "Unexpected error.");
        setLoading(false);
        return;
      }

      renderReport(data);
    } catch (err) {
      showError("Network error: " + err.message);
      setLoading(false);
    }
  }

  function renderReport(data) {
    document.getElementById("empty-state").style.display = "none";
    document.getElementById("loading-state").style.display = "none";

    document.getElementById("dl-md").href = data.md_url;
    document.getElementById("dl-pdf").href = data.pdf_url;

    document.getElementById("download-bar").style.display = "flex";

    const output = document.getElementById("report-output");
    output.innerHTML = data.html;
    output.style.display = "block";

    // Scroll report area into view
    output.scrollIntoView({ behavior: "smooth", block: "start" });
  }

  function setLoading(on) {
    document.getElementById("submit-btn").disabled = on;
    document.getElementById("loading-state").style.display = on ? "flex" : "none";
    if (on) {
      document.getElementById("empty-state").style.display = "none";
      document.getElementById("report-output").style.display = "none";
      document.getElementById("download-bar").style.display = "none";
    }
  }

  function showError(msg) {
    const el = document.getElementById("error-msg");
    el.textContent = msg;
    el.style.display = "block";
  }

  function resetForm() {
    document.getElementById("company-input").value = "";
    document.getElementById("content-input").value = "";
    document.getElementById("file-input").value = "";
    document.getElementById("file-name").textContent = "No file selected";
    document.getElementById("error-msg").style.display = "none";
    document.getElementById("download-bar").style.display = "none";
    document.getElementById("report-output").style.display = "none";
    document.getElementById("loading-state").style.display = "none";
    document.getElementById("empty-state").style.display = "flex";
    document.getElementById("submit-btn").disabled = false;
  }

  // Allow Cmd/Ctrl+Enter to submit
  document.getElementById("content-input").addEventListener("keydown", function (e) {
    if ((e.metaKey || e.ctrlKey) && e.key === "Enter") generateReport();
  });
</script>

</body>
</html>
